<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Control | Contact</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="info-page">
  <header class="site-header">
    <h1>Flight Control</h1>
    <nav>
      <a href="home.html#home">Home</a>
      <a href="home.html#fleet">Fleet</a>
      <a href="about.html">About</a>
      <a href="contact.html" class="is-active" aria-current="page">Contact</a>
      <a href="index.html" class="logout-link">Logout</a>
    </nav>
    <label class="switch" aria-label="Toggle dark mode">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </header>

  <main class="info-main">
    <section class="contact-panel">
      <div>
        <p class="eyebrow">Concierge desk</p>
        <h2>Start your next aviation conversation.</h2>
      </div>
      <div class="contact-details">
        <p>Email: <a href="mailto:perezmainaabel@gmail.com">perezmainaabel@gmail.com</a></p>
        <p>Phone: <a href="tel:+254740218358">+254 740 218 358</a></p>
        <p>Location: Nairobi, Kenya</p>
      </div>
      <form class="contact-form" action="https://api.web3forms.com/submit" method="POST" aria-label="Contact Flight Control">
        <input type="hidden" name="access_key" value="">
        <input type="hidden" name="subject" value="New Contact Issue from Flight Control">
        <input type="hidden" name="from_name" value="Flight Control Contact Form">
        <input type="checkbox" name="botcheck" class="web3forms-botcheck" tabindex="-1" autocomplete="off">
        <label>
          Full name
          <input type="text" name="name" autocomplete="name" required>
        </label>
        <label>
          Email
          <input type="email" name="email" autocomplete="email" required>
        </label>
        <label>
          Phone
          <input type="tel" name="phone" autocomplete="tel" required>
        </label>
        <label class="contact-form-issue">
          Issue
          <textarea name="message" rows="5" required></textarea>
        </label>
        <button type="submit">Send Issue</button>
        <p class="contact-form-status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
