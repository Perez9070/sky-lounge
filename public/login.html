<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Control | Member Access</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
  <header>
    <h1>Member Access</h1>
    <nav>
      <a href="signup.html">Request Access</a>
    </nav>
    <label class="switch" aria-label="Toggle dark mode">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </header>

  <main class="auth-main">
    <section class="auth-split">
      <div class="auth-story">
        <p class="eyebrow">Concierge portal</p>
        <h2>Your flight planning desk is ready.</h2>
        <p>
          Continue into a calm command center for aircraft research, route estimates, and aviation support.
        </p>
        <div class="auth-proof">
          <span>Private access</span>
          <span>Aircraft dossiers</span>
          <span>Nairobi support</span>
        </div>
      </div>

      <section class="card auth-card premium-auth-card">
        <p class="eyebrow">Sign in</p>
        <h2>Enter your desk</h2>
        <form class="auth-form auth-login-form">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" name="email" placeholder="name@example.com" required>

          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" name="password" placeholder="Your password" required>

          <button type="submit">Sign In</button>
        </form>
        <p class="auth-message" aria-live="polite"></p>
        <p>Need access? <a class="back-link" href="signup.html">Request an account</a></p>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
