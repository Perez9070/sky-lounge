<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flight Control | Aircraft Dossier</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="dossier-page">
  <header>
    <h1>Aircraft Dossier</h1>
    <nav>
      <a href="home.html#home">Home</a>
      <a href="aircraft.html">Fleet</a>
      <a href="contact.html">Contact</a>
      <a href="privacy.html" target="_blank" rel="noopener noreferrer">Privacy</a>
      <a href="index.html" class="logout-link">Logout</a>
    </nav>
    <label class="switch" aria-label="Toggle dark mode">
      <input type="checkbox" id="themeToggle">
      <span class="slider"></span>
    </label>
  </header>

  <main class="dossier-main">
    <section class="dossier-hero">
      <img id="planeImage" src="images/boeing-737.jpg" alt="Selected aircraft">
      <div class="dossier-overlay">
        <p class="eyebrow" id="planeCategory">Aircraft</p>
        <h2 id="planeName">Plane</h2>
        <p id="planeDescription"></p>
      </div>
    </section>

    <section class="dossier-panel">
      <div class="spec-card">
        <span>Type</span>
        <strong id="planeType"></strong>
      </div>
      <div class="spec-card">
        <span>Condition</span>
        <strong id="planeCondition"></strong>
      </div>
      <div class="spec-card">
        <span>Signature</span>
        <strong id="planeSignature"></strong>
      </div>
    </section>

    <section class="mission-brief">
      <div>
        <p class="eyebrow">Mission brief</p>
        <h2>Mission notes</h2>
      </div>
      <p id="planeSpecs"></p>
    </section>

    <section class="dossier-actions">
      <a class="button-link secondary-action" href="aircraft.html">Back to Fleet</a>
      <a class="button-link primary-action" href="contact.html">Request Consultation</a>
    </section>
  </main>

  <script src="script.js"></script>
  <script src="plane.js"></script>
</body>
</html>
